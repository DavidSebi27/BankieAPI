openapi: 3.0.3
info:
  title: Bankie API
  description: >
    REST API for the Inholland Code Generation banking application.
    Supports customer self-registration, employee account management,
    fund transfers, ATM operations, and transaction history.

    **Authentication:** All endpoints except `/auth/register` and `/auth/login`
    require a valid JWT Bearer token obtained from the login endpoint.

    **Roles:**
    - `CUSTOMER` — can manage their own accounts and transactions
    - `EMPLOYEE` — has full access to all users, accounts, and transactions
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://your-app.onrender.com
    description: Production (Render)

tags:
  - name: Auth
    description: Customer self-registration and login for all user types.
  - name: Users
    description: >
      User management endpoints. Restricted to employees unless noted.
  - name: Accounts
    description: >
      Bank account operations including creation, retrieval, limit updates,
      and account closure. Customers can only access their own accounts.
  - name: Transactions
    description: >
      Fund transfers between accounts and full transaction history.
      Employees can view all transactions; customers see only their own.
  - name: ATM
    description: >
      ATM deposit and withdrawal operations. Only available to authenticated customers.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT obtained from POST /auth/login. Include it as
        Authorization: Bearer <token> on all protected endpoints.

  schemas:

    RegisterRequest:
      type: object
      required: [firstName, lastName, email, password, bsn, phoneNumber]
      properties:
        firstName:
          type: string
          description: Customer's first name.
          example: Giga
        lastName:
          type: string
          description: Customer's last name.
          example: Chad
        email:
          type: string
          format: email
          description: Unique email address used as the login identifier.
          example: gigachad@gigabank.nl
        password:
          type: string
          format: password
          minLength: 8
          description: Account password. Must be at least 8 characters.
          example: ILoveMoney123!
        bsn:
          type: string
          pattern: '^\d{8,9}$'
          description: Dutch citizen service number (BSN). Must be 8 or 9 digits.
          example: "069420666"
        phoneNumber:
          type: string
          description: Contact phone number in international format.
          example: "+31612345678"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: The registered email address.
          example: gigachad@gigabank.nl
        password:
          type: string
          format: password
          description: The account password.
          example: ILoveMoney123!

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: >
            Signed JWT. Include in all subsequent requests as:
            Authorization: Bearer <token>.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJnaWdhY2hhZEBnaWdhYmFuay5ubCJ9.s3cr3t
        role:
          $ref: '#/components/schemas/Role'

    Role:
      type: string
      description: >
        The user's system role.
        CUSTOMER: standard bank customer with limited access.
        EMPLOYEE: bank staff with full administrative access.
      enum: [CUSTOMER, EMPLOYEE]

    AccountStatus:
      type: string
      description: >
        Lifecycle state of a bank account.
        PENDING: awaiting employee approval.
        ACTIVE: fully operational.
        CLOSED: permanently closed; no transactions allowed.
      enum: [PENDING, ACTIVE, CLOSED]

    UserSummary:
      type: object
      description: Condensed user profile returned in list views and search results.
      properties:
        id:
          type: integer
          format: int64
          description: Unique internal user identifier.
          example: 1
        firstName:
          type: string
          description: User's first name.
          example: Giga
        lastName:
          type: string
          description: User's last name.
          example: Chad
        email:
          type: string
          description: User's email address.
          example: gigachad@gigabank.nl
        phoneNumber:
          type: string
          description: User's contact phone number.
          example: "+31612345678"
        bsn:
          type: string
          description: User's Dutch citizen service number.
          example: "069420666"
        role:
          $ref: '#/components/schemas/Role'
        approved:
          type: boolean
          description: >
            True when an employee has approved this customer and created their bank accounts.
          example: false

    AccountType:
      type: string
      description: >
        The type of bank account.
        CHECKING: day-to-day transactional account; accepts incoming transfers.
        SAVINGS: savings account; cannot receive external transfers.
      enum: [CHECKING, SAVINGS]

    Account:
      type: object
      description: A bank account belonging to a customer.
      properties:
        iban:
          type: string
          description: >
            International Bank Account Number in the format NLxxINHO0xxxxxxxxx.
            Used as the primary identifier for transactions.
          example: NL69INHO0420666999
        type:
          $ref: '#/components/schemas/AccountType'
        balance:
          type: number
          format: double
          description: Current balance in EUR. May be negative down to absoluteLimit.
          example: 9999999.99
        currency:
          type: string
          enum: [EUR]
          description: Currency of the account. Currently only EUR is supported.
          example: EUR
        status:
          $ref: '#/components/schemas/AccountStatus'
        absoluteLimit:
          type: number
          format: double
          description: >
            Minimum allowed balance. The account balance may never fall below this value.
            A negative value permits an overdraft up to that amount.
          example: -50.00
        dailyTransferLimit:
          type: number
          format: double
          description: >
            Maximum total amount (EUR) that can be transferred out of this account
            within a single calendar day.
          example: 10000.00
        ownerId:
          type: integer
          format: int64
          description: User ID of the account owner.
          example: 1

    AccountDetails:
      type: object
      description: Full account view including the account data and the owner's profile.
      properties:
        account:
          $ref: '#/components/schemas/Account'
        owner:
          $ref: '#/components/schemas/UserSummary'

    CreateAccountsRequest:
      type: object
      description: >
        Used by an employee when approving a new customer.
        Both a CHECKING and SAVINGS account are created with these limits.
      required: [absoluteLimit, dailyTransferLimit]
      properties:
        absoluteLimit:
          type: number
          format: double
          description: Minimum allowed balance for the new accounts.
          example: -50.00
        dailyTransferLimit:
          type: number
          format: double
          description: Maximum daily outgoing transfer amount for the new accounts.
          example: 10000.00

    UpdateLimitsRequest:
      type: object
      description: >
        Partial update for an account's financial limits.
        Only provided fields are updated; omitted fields retain their current values.
      properties:
        absoluteLimit:
          type: number
          format: double
          description: New minimum allowed balance.
          example: -50.00
        dailyTransferLimit:
          type: number
          format: double
          description: New maximum daily outgoing transfer limit.
          example: 500.00

    IbanSearchResult:
      type: object
      description: >
        Minimal result returned when searching for a customer's IBAN.
        Only name and IBAN are exposed to protect customer privacy.
      properties:
        firstName:
          type: string
          description: Account owner's first name.
          example: Broke
        lastName:
          type: string
          description: Account owner's last name.
          example: Boy
        iban:
          type: string
          description: The customer's CHECKING account IBAN.
          example: NL42INHO0000000001

    TransactionType:
      type: string
      description: >
        Indicates how money moved.
        TRANSFER: between two customer accounts.
        DEPOSIT: cash added via ATM.
        WITHDRAWAL: cash taken out via ATM.
      enum: [TRANSFER, DEPOSIT, WITHDRAWAL]

    Transaction:
      type: object
      description: A record of a completed financial operation.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for this transaction.
          example: 1337
        type:
          $ref: '#/components/schemas/TransactionType'
        fromIban:
          type: string
          nullable: true
          description: Source IBAN. Null for ATM deposits.
          example: NL69INHO0420666999
        toIban:
          type: string
          nullable: true
          description: Destination IBAN. Null for ATM withdrawals.
          example: NL42INHO0000000001
        amount:
          type: number
          format: double
          description: Transaction amount in EUR. Always positive.
          example: 4.20
        currency:
          type: string
          enum: [EUR]
          description: Currency of the transaction. Currently only EUR.
          example: EUR
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 date-time when the transaction was processed.
          example: "2025-04-16T04:20:00Z"
        initiatedBy:
          type: integer
          format: int64
          description: >
            User ID of the person who triggered the transaction.
            For customer-initiated transfers this is the sender.
            For employee-initiated transfers this is the employee.
          example: 1

    TransferRequest:
      type: object
      description: Request body for initiating a fund transfer.
      required: [fromIban, toIban, amount]
      properties:
        fromIban:
          type: string
          description: IBAN of the account to debit.
          example: NL69INHO0420666999
        toIban:
          type: string
          description: IBAN of the account to credit. Must be a CHECKING account.
          example: NL42INHO0000000001
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Amount to transfer in EUR. Must be at least 0.01.
          example: 4.20

    AtmRequest:
      type: object
      description: Request body for ATM deposit or withdrawal operations.
      required: [iban, amount]
      properties:
        iban:
          type: string
          description: IBAN of the account to deposit into or withdraw from.
          example: NL69INHO0420666999
        amount:
          type: number
          format: double
          minimum: 0.01
          description: Cash amount in EUR. Must be at least 0.01.
          example: 500.00

    PagedTransactions:
      type: object
      description: Paginated list of transactions.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        page:
          type: integer
          description: Current page index (zero-based).
          example: 0
        size:
          type: integer
          description: Number of items per page.
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of transactions matching the query.
          example: 1337
        totalPages:
          type: integer
          description: Total number of pages.
          example: 67

    PagedAccounts:
      type: object
      description: Paginated list of accounts.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        page:
          type: integer
          description: Current page index (zero-based).
          example: 0
        size:
          type: integer
          description: Number of items per page.
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of accounts matching the query.
          example: 69
        totalPages:
          type: integer
          description: Total number of pages.
          example: 4

    PagedUsers:
      type: object
      description: Paginated list of user summaries.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        page:
          type: integer
          description: Current page index (zero-based).
          example: 0
        size:
          type: integer
          description: Number of items per page.
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of users matching the query.
          example: 3
        totalPages:
          type: integer
          description: Total number of pages.
          example: 1

    ErrorResponse:
      type: object
      description: Standard error body returned for all 4xx and 5xx responses.
      properties:
        status:
          type: integer
          description: HTTP status code.
          example: 400
        message:
          type: string
          description: Human-readable description of the error.
          example: "email: must be a well-formed email address"
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 date-time when the error occurred.
          example: "2025-04-16T04:20:00Z"

  responses:
    Unauthorized:
      description: >
        401 Unauthorized — Missing, expired, or invalid JWT token.
        Obtain a fresh token via POST /auth/login.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 401
            message: "Missing or invalid Bearer token."
            timestamp: "2025-04-16T04:20:00Z"

    Forbidden:
      description: >
        403 Forbidden — The authenticated user does not have the required role.
        Employee-only endpoints require the EMPLOYEE role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 403
            message: "Access denied."
            timestamp: "2025-04-16T04:20:00Z"

    NotFound:
      description: >
        404 Not Found — The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 404
            message: "Resource not found."
            timestamp: "2025-04-16T04:20:00Z"

    BadRequest:
      description: >
        400 Bad Request — The request body or query parameters failed validation.
        The message field lists the specific violations.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 400
            message: "bsn: must match \\d{8,9}"
            timestamp: "2025-04-16T04:20:00Z"

  parameters:
    pageParam:
      name: page
      in: query
      description: Zero-based page index. Defaults to 0.
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    sizeParam:
      name: size
      in: query
      description: Number of items to return per page. Defaults to 20.
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

paths:

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer
      description: >
        Creates a new customer account. The customer can log in immediately
        but cannot access banking features until an employee approves their account
        and creates their bank accounts. No IBAN is issued at this stage.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              firstName: Giga
              lastName: Chad
              email: gigachad@gigabank.nl
              password: ILoveMoney123!
              bsn: "069420666"
              phoneNumber: "+31612345678"
      responses:
        '201':
          description: >
            Customer successfully registered. approved is false until an employee
            creates their bank accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: >
            409 Conflict — The provided email or BSN is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emailConflict:
                  summary: Email already registered
                  value:
                    status: 409
                    message: "Email address is already in use."
                    timestamp: "2025-04-16T04:20:00Z"
                bsnConflict:
                  summary: BSN already registered
                  value:
                    status: 409
                    message: "BSN is already associated with an existing account."
                    timestamp: "2025-04-16T04:20:00Z"

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and obtain a JWT
      description: >
        Validates credentials and returns a signed JWT.
        Include the token in all subsequent requests as:
        Authorization: Bearer <token>.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: gigachad@gigabank.nl
              password: ILoveMoney123!
      responses:
        '200':
          description: Login successful. Returns the JWT and the user's role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: >
            401 Unauthorized — The email or password is incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 401
                message: "Invalid email or password."
                timestamp: "2025-04-16T04:20:00Z"

  /users:
    get:
      tags: [Users]
      summary: List all users (employee only)
      description: >
        Returns a paginated list of all registered customers.
        Use the approved query parameter to filter by approval status.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sizeParam'
        - name: approved
          in: query
          description: >
            Filter by approval status.
            false: customers awaiting account creation.
            true: customers with active bank accounts.
            Omit to return all customers.
          required: false
          schema:
            type: boolean
          example: false
      responses:
        '200':
          description: Paginated list of users matching the filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUsers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get a user by ID (employee only)
      description: >
        Returns the full profile of a single user.
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique identifier of the user to retrieve.
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: User profile found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      description: >
        Returns a paginated list of bank accounts.
        EMPLOYEE: returns all accounts in the system.
        CUSTOMER: returns only accounts belonging to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sizeParam'
      responses:
        '200':
          description: Paginated list of accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAccounts'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/search:
    get:
      tags: [Accounts]
      summary: Search for an IBAN by customer name (customer only)
      description: >
        Allows a customer to find another customer's CHECKING account IBAN
        by first and last name. Only IBAN and name are returned.
        Both firstName and lastName are required.
      parameters:
        - name: firstName
          in: query
          required: true
          description: Exact first name of the account holder to search for.
          schema:
            type: string
          example: Broke
        - name: lastName
          in: query
          required: true
          description: Exact last name of the account holder to search for.
          schema:
            type: string
          example: Boy
      responses:
        '200':
          description: >
            List of matching accounts. Returns an empty array if no match is found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IbanSearchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /accounts/{iban}:
    get:
      tags: [Accounts]
      summary: Get account details by IBAN
      description: >
        Returns full account details including the owner's profile.
        EMPLOYEE: can retrieve any account.
        CUSTOMER: can only retrieve their own accounts.
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the account to retrieve.
          schema:
            type: string
          example: NL69INHO0420666999
      responses:
        '200':
          description: Account details including owner profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /accounts/{iban}/close:
    patch:
      tags: [Accounts]
      summary: Close an account (employee only)
      description: >
        Sets the account status to CLOSED. A closed account cannot send or
        receive any transactions.
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the account to close.
          schema:
            type: string
          example: NL69INHO0420666999
      responses:
        '200':
          description: Account successfully closed. Returns the updated account object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /accounts/{iban}/limits:
    patch:
      tags: [Accounts]
      summary: Update transfer limits on an account (employee only)
      description: >
        Updates the absoluteLimit and/or dailyTransferLimit on an account.
        Omitted fields retain their current values.
        absoluteLimit: lowest balance permitted (negative values allow overdraft).
        dailyTransferLimit: maximum outgoing transfer amount per calendar day.
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the account whose limits are to be updated.
          schema:
            type: string
          example: NL69INHO0420666999
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLimitsRequest'
            example:
              absoluteLimit: -50.00
              dailyTransferLimit: 500.00
      responses:
        '200':
          description: Limits updated successfully. Returns the updated account object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/accounts:
    post:
      tags: [Accounts]
      summary: Approve customer and create bank accounts (employee only)
      description: >
        Approves a pending customer and creates two bank accounts: one CHECKING
        and one SAVINGS. IBANs are auto-generated in format NLxxINHO0xxxxxxxxx.
        Both accounts share the provided absoluteLimit and dailyTransferLimit.
        After this call the customer's approved flag becomes true and they gain
        full access to banking features.
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique identifier of the customer to approve.
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountsRequest'
            example:
              absoluteLimit: -50.00
              dailyTransferLimit: 10000.00
      responses:
        '201':
          description: >
            Customer approved. Returns an array with the new CHECKING and SAVINGS accounts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: >
            409 Conflict — The customer already has bank accounts.
            Each customer may only be approved once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 409
                message: "This customer already has bank accounts."
                timestamp: "2025-04-16T04:20:00Z"

  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      description: >
        Returns a paginated list of transactions with optional filters.
        EMPLOYEE: sees all transactions in the system.
        CUSTOMER: sees only transactions where they are sender or receiver.
        All filter parameters are optional and combinable.
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sizeParam'
        - name: iban
          in: query
          description: Filter to transactions involving this IBAN (either fromIban or toIban).
          required: false
          schema:
            type: string
          example: NL69INHO0420666999
        - name: startDate
          in: query
          description: Return only transactions on or after this date (inclusive). Format YYYY-MM-DD.
          required: false
          schema:
            type: string
            format: date
          example: "2025-01-01"
        - name: endDate
          in: query
          description: Return only transactions on or before this date (inclusive). Format YYYY-MM-DD.
          required: false
          schema:
            type: string
            format: date
          example: "2025-12-31"
        - name: amountOperator
          in: query
          description: >
            Comparison operator used with the amount parameter.
            lt: less than. gt: greater than. eq: equal to.
            Ignored if amount is not also provided.
          required: false
          schema:
            type: string
            enum: [lt, gt, eq]
          example: gt
        - name: amount
          in: query
          description: Amount in EUR to compare against using amountOperator.
          required: false
          schema:
            type: number
            format: double
          example: 100.00
      responses:
        '200':
          description: Paginated transaction list matching the applied filters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactions'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Transactions]
      summary: Initiate a fund transfer
      description: >
        Transfers money from one account to another.
        CUSTOMER: may transfer between own accounts or to another customer's CHECKING account.
        Cannot transfer from accounts they do not own. Subject to absoluteLimit and dailyTransferLimit.
        EMPLOYEE: may transfer between any two customer CHECKING accounts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
            example:
              fromIban: NL69INHO0420666999
              toIban: NL42INHO0000000001
              amount: 4.20
      responses:
        '201':
          description: Transfer completed. Returns the created transaction record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: >
            422 Unprocessable Entity — Business rule violation.
            Common causes: insufficient balance (would breach absoluteLimit),
            daily transfer limit already reached, account not ACTIVE,
            or customer attempting to transfer from another customer's account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                limitExceeded:
                  summary: Daily transfer limit exceeded
                  value:
                    status: 422
                    message: "Daily transfer limit exceeded."
                    timestamp: "2025-04-16T04:20:00Z"
                insufficientFunds:
                  summary: Insufficient balance
                  value:
                    status: 422
                    message: "Transfer would breach the account's absolute limit."
                    timestamp: "2025-04-16T04:20:00Z"

  /transactions/{userId}:
    get:
      tags: [Transactions]
      summary: Get transactions for a specific customer (employee only)
      description: >
        Returns the complete paginated transaction history for a single customer,
        including all accounts they own.
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique identifier of the customer whose transactions to retrieve.
          schema:
            type: integer
            format: int64
          example: 1
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sizeParam'
      responses:
        '200':
          description: Paginated transaction history for the specified customer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /atm/deposit:
    post:
      tags: [ATM]
      summary: Deposit cash via ATM (customer only)
      description: >
        Records a cash deposit into the specified account and increases the balance.
        The account must be ACTIVE. The absoluteLimit and dailyTransferLimit are not
        applied to deposits. A DEPOSIT transaction record is created and returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AtmRequest'
            example:
              iban: NL69INHO0420666999
              amount: 500.00
      responses:
        '201':
          description: Deposit successful. Returns the created transaction record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: >
            422 Unprocessable Entity — Business rule violation.
            Common causes: account is not ACTIVE, or customer does not own the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 422
                message: "Account is not active."
                timestamp: "2025-04-16T04:20:00Z"

  /atm/withdraw:
    post:
      tags: [ATM]
      summary: Withdraw cash via ATM (customer only)
      description: >
        Records a cash withdrawal from the specified account and decreases the balance.
        The account must be ACTIVE.
        Business rules enforced: balance may not fall below absoluteLimit,
        and the withdrawal counts toward the account's dailyTransferLimit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AtmRequest'
            example:
              iban: NL69INHO0420666999
              amount: 250.00
      responses:
        '201':
          description: Withdrawal successful. Returns the created transaction record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: >
            422 Unprocessable Entity — Business rule violation.
            Common causes: insufficient balance (would breach absoluteLimit),
            daily transfer limit already reached, account not ACTIVE,
            or customer does not own the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientFunds:
                  summary: Insufficient balance
                  value:
                    status: 422
                    message: "Insufficient balance to complete the withdrawal."
                    timestamp: "2025-04-16T04:20:00Z"
                limitExceeded:
                  summary: Daily limit exceeded
                  value:
                    status: 422
                    message: "Daily transfer limit exceeded."
                    timestamp: "2025-04-16T04:20:00Z"
