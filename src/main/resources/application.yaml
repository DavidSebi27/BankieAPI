server:
  port: ${PORT:8080}

spring:
  application:
    name: bankie-api
  datasource:
    url: jdbc:h2:mem:bankiedb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.netlify.app}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

bankie:
  iban:
    bank-code: INHO0
  account:
    default-daily-limit: 1000.00